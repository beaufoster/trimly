name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  redirect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Create redirect page
      run: |
        mkdir -p dist
        cat > dist/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://www.weightcast.com">
            <link rel="canonical" href="https://www.weightcast.com">
            <title>WeightCast</title>
          </head>
          <body>
            <p>Redirecting to <a href="https://www.weightcast.com">www.weightcast.com</a>…</p>
            <script>window.location.replace("https://www.weightcast.com")</script>
          </body>
        </html>
        EOF

    - name: Deploy redirect to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
