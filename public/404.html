<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Trimly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,900&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(160deg, #161613 0%, #0d3d24 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      color: #fff;
      text-align: center;
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.5px;
      margin-bottom: 48px;
    }
    .logo em { color: #4abe7e; font-style: italic; }
    .code {
      font-family: 'Fraunces', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      font-style: italic;
      color: #4abe7e;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      color: #fff;
      margin-bottom: 12px;
    }
    p {
      color: #7ec9a0;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 36px;
    }
    .btn {
      display: inline-block;
      background: #1a6b42;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .btn:hover { background: #22a05a; }
  </style>
</head>
<body>
  <div class="logo">Trim<em>ly</em></div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist. Head back to the app and keep working toward your goal.</p>
  <a href="/" class="btn">Back to Trimly →</a>
</body>
</html>
